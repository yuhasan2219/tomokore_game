<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クラス、入門。</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>クラス、入門。</h1>
        <p>送る前に試せる、転校生向けクラス会話シミュレーター</p>
      </header>

      <main>
        <section id="titleScreen" class="screen active">
          <h2>タイトル</h2>
          <div class="stack">
            <button data-action="new">はじめる</button>
            <button data-action="continue" id="continueBtn">つづきから</button>
            <button data-action="reset" class="danger">データをリセット</button>
          </div>
        </section>

        <section id="setupScreen" class="screen">
          <h2>初期設定</h2>
          <label for="playerNameInput">プレイヤー名</label>
          <input id="playerNameInput" maxlength="20" placeholder="例：結菜" />
          <button id="setupSubmitBtn">決定</button>
          <button class="ghost" data-back="title">戻る</button>
        </section>

        <section id="mainScreen" class="screen">
          <div class="hud">
            <p><strong>プレイヤー:</strong> <span id="playerNameLabel"></span></p>
            <p><strong>日付:</strong> <span id="dayLabel"></span>日目</p>
            <p><strong>イベント:</strong> <span id="eventLabel"></span></p>
          </div>

          <h2>クラス一覧（44人）</h2>
          <div id="studentsList" class="students-list"></div>
          <div class="footer-actions">
            <button data-action="openSettings">設定</button>
          </div>
        </section>

        <section id="talkScreen" class="screen">
          <h2>会話入力</h2>
          <p>相手: <strong id="talkTargetName"></strong></p>
          <p class="hint">性格ヒント: <span id="talkTargetHint"></span></p>
          <textarea
            id="messageInput"
            maxlength="120"
            placeholder="1〜120文字で入力"
          ></textarea>
          <p id="charCounter">0 / 120</p>

          <fieldset>
            <legend>構文選択</legend>
            <label><input type="radio" name="syntax" value="ojisan" checked /> おじさん構文</label>
            <label><input type="radio" name="syntax" value="mother" /> お母さんヒス構文</label>
            <label><input type="radio" name="syntax" value="chappy" /> チャッピー構文</label>
          </fieldset>

          <div class="footer-actions">
            <button id="sendBtn">実行</button>
            <button class="ghost" data-back="main">戻る</button>
          </div>
        </section>

        <section id="resultScreen" class="screen">
          <h2>結果表示</h2>
          <p><strong>元の入力文:</strong> <span id="resultOriginal"></span></p>
          <p><strong>構文変換後:</strong> <span id="resultConverted"></span></p>
          <p><strong>好感度変化:</strong> <span id="resultDelta"></span></p>
          <p><strong>更新後好感度:</strong> <span id="resultTotal"></span></p>
          <p><strong>空気:</strong> <span id="resultMood" class="mood"></span></p>
          <button id="resultNextBtn">次へ</button>
        </section>

        <section id="eventScreen" class="screen">
          <h2>イベント発生</h2>
          <p><strong id="eventTitle"></strong></p>
          <p id="eventDescription"></p>
          <p id="eventImpact"></p>
          <button id="eventNextBtn">次へ</button>
        </section>

        <section id="settingsScreen" class="screen">
          <h2>設定</h2>
          <p>バージョン: v0.1.0-mvp</p>
          <p>ローカル保存（LocalStorage）を利用します。</p>
          <div class="stack">
            <button data-action="reset" class="danger">データをリセット</button>
            <button class="ghost" data-back="main">戻る</button>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
